name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, curl, mysql, redis, zip, gd, intl
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts (best-effort)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 20 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync code to VPS
        run: |
          sync_to_vps() {
            rsync -rlptvz -e "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" --delete --no-owner --no-group \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='storage/logs/*' \
              --exclude='storage/framework/cache/*' \
              --exclude='storage/framework/sessions/*' \
              --exclude='storage/framework/views/*' \
              --exclude='storage/app/public/*' \
              --exclude='storage/app/private/*' \
              ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/epathways-staging/
          }
          for attempt in 1 2 3; do
            echo "rsync attempt $attempt/3..."
            sync_to_vps && exit 0
            echo "rsync attempt $attempt failed (SSH/network); retrying in 20s..." && sleep 20
          done
          echo "rsync failed after 3 attempts — VPS unreachable on port 22" >&2
          exit 1

      - name: Run post-deploy commands on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /var/www/epathways-staging &&
            sudo chown -R deploy:www-data storage bootstrap/cache &&
            sudo find storage bootstrap/cache -type d -exec chmod 2775 {} \; &&
            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \; &&
            php artisan storage:link &&
            php artisan migrate --force &&
            php artisan config:cache &&
            php artisan view:cache &&
            php artisan queue:restart
          '
